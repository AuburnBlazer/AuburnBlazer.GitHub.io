<body><div class="topbar"><div class="toolbar-section toolbar-home"><div class="toolbar-title">Navigation</div><div class="toolbar-links"><a href="javascript:history.back()">Back</a><a href="/index.html">Home</a></div></div><div class="toolbar-divider"></div><div class="toolbar-section"><div class="toolbar-title">College Football</div><div class="toolbar-links"><a href="/CFB/2025/CFBrankings.html">Rankings</a><a href="/CFB/2025/compare.html">Compare Teams</a><a href="/CFB/2025/GamesThisWeek.html">Games This Week</a><a href="/CFB/2025/playoffs.html">CFP Projection</a></div></div><div class="toolbar-divider"></div><div class="toolbar-section"><div class="toolbar-title">College Basketball</div><div class="toolbar-links"><a href="/MBB/2025/MBBrankings.html">Rankings</a><a href="/MBB/2025/compare.html">Compare Teams</a><a href="/MBB/2025/GamesThisWeek.html">Games This Week</a><a href="/MBB/2025/MarchMadnessProj.html">March Madness Projection</a></div></div></div><h1>CFB Games This Week</h1><div class="filter-container"><label for="conferenceFilter">Conference:</label><select id="conferenceFilter" onchange="filterGames()"><option value="ALL">All Conferences</option><option value="SEC">SEC </option><option value="ACC">ACC </option><option value="Big XII">Big XII </option><option value="Big Ten">Big Ten </option><option value="PAC">PAC </option><option value="AAC">AAC </option><option value="MWC">MWC </option><option value="CUSA">CUSA </option><option value="SBC">SBC </option><option value="MAC">MAC </option></select></div>    <div class="games-grid">

                <script>
function filterGames() {

    const selected =
        document.getElementById("conferenceFilter").value;

    const matchups =
        document.querySelectorAll(".matchup-link");

    matchups.forEach(matchup => {

        const away =
            matchup.dataset.awayConf;

        const home =
            matchup.dataset.homeConf;

        if (
            selected === "ALL" ||
            away === selected ||
            home === selected
        ) {
            matchup.style.display = "block";
        }
        else {
            matchup.style.display = "none";
        }
    });
}
</script>
